# Inner Circle — Your People
#
# This is the list of friends /inner-circle checks on.
# Put this file at: ~/Coding/notes/projects/inner-circle/circle.yaml
#
# Tiers:
#   ride-or-die  — Your absolute closest. Flagged prominently if overdue.
#   close        — Real friends you actively want in your life.
#   keep-warm    — People you care about but see less often.
#
# Cadence is in days — how often you ideally see or talk to this person.
# preferred_contact: text | email | call | voice-memo

